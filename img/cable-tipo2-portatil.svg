<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <rect width="800" height="600" fill="#f8f8f6"/>

  <!-- Cable body - coiled -->
  <g transform="translate(400,310)">
    <!-- Coil circles -->
    <ellipse cx="0" cy="20" rx="110" ry="38" fill="none" stroke="#1a1a2e" stroke-width="14" stroke-linecap="round" opacity="0.15"/>
    <ellipse cx="0" cy="5" rx="110" ry="38" fill="none" stroke="#1a1a2e" stroke-width="14" stroke-linecap="round" opacity="0.25"/>
    <ellipse cx="0" cy="-10" rx="110" ry="38" fill="none" stroke="#1a1a2e" stroke-width="14" stroke-linecap="round" opacity="0.4"/>
    <ellipse cx="0" cy="-25" rx="110" ry="38" fill="none" stroke="#222240" stroke-width="14" stroke-linecap="round" opacity="0.6"/>
    <ellipse cx="0" cy="-40" rx="110" ry="38" fill="none" stroke="#222240" stroke-width="14" stroke-linecap="round" opacity="0.8"/>
    <ellipse cx="0" cy="-55" rx="110" ry="38" fill="none" stroke="#1e1e3a" stroke-width="14" stroke-linecap="round"/>
    <!-- Highlight on coil -->
    <ellipse cx="-40" cy="-72" rx="30" ry="8" fill="none" stroke="#4a4a6a" stroke-width="4" opacity="0.5"/>
  </g>

  <!-- Cable exit left - going to Schuko -->
  <path d="M 290 255 Q 200 240 170 210" fill="none" stroke="#1e1e3a" stroke-width="14" stroke-linecap="round"/>
  <!-- Cable exit right - going to Type2 -->
  <path d="M 510 255 Q 600 240 630 210" fill="none" stroke="#1e1e3a" stroke-width="14" stroke-linecap="round"/>

  <!-- SCHUKO CONNECTOR (left) -->
  <g transform="translate(130,170)">
    <!-- Body -->
    <rect x="-32" y="-55" width="64" height="75" rx="10" fill="#2a2a2a" stroke="#444" stroke-width="1.5"/>
    <rect x="-32" y="-55" width="64" height="20" rx="10" fill="#333"/>
    <!-- Round face -->
    <ellipse cx="0" cy="28" rx="28" ry="28" fill="#222" stroke="#555" stroke-width="1.5"/>
    <ellipse cx="0" cy="28" rx="22" ry="22" fill="#1a1a1a"/>
    <!-- Schuko pins -->
    <circle cx="-8" cy="24" r="4.5" fill="#888"/>
    <circle cx="8" cy="24" r="4.5" fill="#888"/>
    <circle cx="0" cy="35" r="3.5" fill="#666"/>
    <!-- Metal band -->
    <rect x="-28" y="10" width="56" height="6" rx="2" fill="#555" opacity="0.6"/>
    <!-- Label -->
    <text x="0" y="-35" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#00E5A0" letter-spacing="1" font-weight="bold">SCHUKO</text>
    <text x="0" y="-26" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#888">220V · 32A</text>
  </g>

  <!-- TYPE 2 CONNECTOR (right) -->
  <g transform="translate(670,170)">
    <!-- Body -->
    <rect x="-32" y="-55" width="64" height="75" rx="10" fill="#00B87A" stroke="#009966" stroke-width="1.5"/>
    <rect x="-32" y="-55" width="64" height="20" rx="10" fill="#00cc88"/>
    <!-- Heptagonal face -->
    <polygon points="0,-22 20,-12 26,8 15,26 -15,26 -26,8 -20,-12" fill="#007755" stroke="#009966" stroke-width="1.5" transform="translate(0,18)"/>
    <!-- Type 2 pins -->
    <circle cx="-10" cy="20" r="3.5" fill="#004433"/>
    <circle cx="10" cy="20" r="3.5" fill="#004433"/>
    <circle cx="0" cy="12" r="3.5" fill="#004433"/>
    <circle cx="-14" cy="30" r="3" fill="#004433"/>
    <circle cx="14" cy="30" r="3" fill="#004433"/>
    <rect x="-8" y="34" width="16" height="5" rx="1" fill="#004433"/>
    <!-- Latch mechanism -->
    <rect x="-28" y="8" width="56" height="6" rx="2" fill="#009966" opacity="0.7"/>
    <!-- Label -->
    <text x="0" y="-35" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#fff" letter-spacing="1" font-weight="bold">IEC 62196</text>
    <text x="0" y="-26" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#ccffee">TIPO 2</text>
  </g>

  <!-- Product info top -->
  <text x="400" y="60" text-anchor="middle" font-family="'Arial Black', Arial, sans-serif" font-size="22" fill="#0a0a1a" letter-spacing="3" font-weight="900">CABLE TIPO 2 PORTÁTIL</text>
  <text x="400" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#555" letter-spacing="2">7,4 kW · 32A · 5 METROS · IP55</text>

  <!-- Divider line -->
  <line x1="280" y1="105" x2="520" y2="105" stroke="#00E5A0" stroke-width="2"/>

  <!-- Specs row -->
  <g font-family="Arial, sans-serif" font-size="12" fill="#333">
    <text x="180" y="132" text-anchor="middle">✅ Certificación CE</text>
    <text x="340" y="132" text-anchor="middle">🔒 Bloqueo automático</text>
    <text x="510" y="132" text-anchor="middle">💧 IP55</text>
    <text x="640" y="132" text-anchor="middle">🛡️ Garantía 12 meses</text>
  </g>

  <!-- Compatible cars label -->
  <text x="400" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#888" letter-spacing="2">COMPATIBLE CON BYD · CHEVROLET SPARK · GEELY EX5 · VOLVO EX30 · RENAULT KANGOO</text>

  <!-- ElectroMov badge -->
  <rect x="330" y="510" width="140" height="32" rx="4" fill="#0a0a1a"/>
  <text x="400" y="531" text-anchor="middle" font-family="'Arial Black', Arial, sans-serif" font-size="14" fill="#00E5A0" letter-spacing="3">ElectroMov</text>
</svg>
